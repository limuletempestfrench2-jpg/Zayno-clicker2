<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Blood Engine</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAV -->
<div class="nav">
  <span onclick="openTab('shop')">SHOP</span>
  <span onclick="openTab('ascension')">ASCENSION</span>
  <span onclick="openTab('profile')">PROFILE</span>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <div class="panel">
      <h2>BLOOD</h2>
      <p>🩸 <span id="blood">0</span></p>
      <p>⚡ <span id="bps">0</span>/s</p>
      <p>🖱️ <span id="bpc">1</span>/clic</p>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <img src="Chibi_minos.png" id="minos">
  </div>

  <!-- RIGHT -->
  <div class="right">

    <!-- SHOP -->
    <div id="shopTab" class="tab active">
      <h2>SHOP</h2>
      <div id="shop"></div>
    </div>

    <!-- ASCENSION -->
    <div id="ascensionTab" class="tab">
      <h2>ASCENSION</h2>
      <p>Coût: <span id="ascCost">10000</span></p>
      <button onclick="doAscend()">ASCEND</button>
    </div>

    <!-- PROFILE -->
    <div id="profileTab" class="tab">
      <h2>PROFILE</h2>

      <input id="nameInput" placeholder="Nom...">
      <textarea id="bioInput" placeholder="Bio..."></textarea>

      <button onclick="saveProfile()">Save</button>

      <h3 id="displayName"></h3>
      <p id="displayBio"></p>
    </div>

  </div>

</div>

<audio id="clickSound" src="click.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
