<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Blood Engine</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- GAUCHE -->
  <div class="left">
    <div class="panel">
      <h2>BLOOD</h2>
      <p>🩸 <span id="blood">0</span></p>
      <p>⚡ <span id="bps">0</span>/s</p>
      <p>🖱️ <span id="bpc">1</span>/clic</p>
      <p>🤖 <span id="sps">0</span>/s auto-clic</p>
    </div>
  </div>

  <!-- CENTRE -->
  <div class="center">
    <img src="Chibi_minos.png" id="minos">
  </div>

  <!-- DROITE -->
  <div class="right">

    <div class="shopHeader">
      <h2>SHOP</h2>
      <button id="ascendBtn">ASCENSION</button>
    </div>

    <div id="shop"></div>
  </div>

</div>

<!-- PANEL ASCENSION -->
<div id="ascensionPanel">
  <h2>ASCENSION</h2>
  <p>Reset ta progression pour obtenir un boost permanent.</p>
  <p>Bonus actuel : +50% production</p>
  <button onclick="doAscend()">ASCEND</button>
  <button onclick="closeAscend()">FERMER</button>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
