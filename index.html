<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Blood Engine</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
  <span onclick="openTab('shop')">SHOP</span>
  <span onclick="openTab('ascension')">ASCENSION</span>
  <span onclick="openTab('profile')">PROFILE</span>
</div>

<div class="container">

  <div class="left">
    <div class="panel">
      <p>🩸 <span id="blood">0</span></p>
      <p>⚡ <span id="bps">0</span>/s</p>
      <p>🖱️ <span id="bpc">1</span></p>
    </div>
  </div>

  <div class="center">
    <img src="Chibi_minos.png" id="minos">
  </div>

  <div class="right">
    <div id="shopTab" class="tab active">
      <div id="shop"></div>
    </div>

    <div id="ascensionTab" class="tab">
      <p>Coût: <span id="ascCost"></span></p>
      <button onclick="ascend()">ASCEND</button>
    </div>

    <div id="profileTab" class="tab">
      <input id="nameInput">
      <textarea id="bioInput"></textarea>
      <button onclick="saveProfile()">Save</button>
      <h3 id="displayName"></h3>
      <p id="displayBio"></p>
    </div>
  </div>

</div>

<script type="module" src="main.js"></script>
</body>
</html>
